version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: warranty_claims
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./lib/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warranty_claims"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: