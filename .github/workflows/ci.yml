name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: warranty_claims
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d warranty_claims"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          POSTGRES_URL: postgresql://postgres:pass@localhost:5432/warranty_claims
          NEXT_PUBLIC_USE_BLOB_UPLOAD: 'false'
          AUTH_SECRET: ci-build-secret-key-at-least-32-chars-long
          ADJUSTER_PASSWORD: test-password